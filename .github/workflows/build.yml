name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    name: Build macOS PKG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Stamp version into manifest.xml
        run: |
          sed -i '' "s|<Version>.*</Version>|<Version>${{ steps.version.outputs.version }}</Version>|" \
            "Theta Review/manifest.xml"

      - name: Stage plugin and bundle into tar
        run: |
          mkdir -p pkg-staging
          cp "Theta Review/manifest.xml"  pkg-staging/
          cp "Theta Review/main.js"       pkg-staging/
          cp "Theta Review/preload.js"    pkg-staging/
          cp "Theta Review/index.html"    pkg-staging/
          cp -r "Theta Review/js"         pkg-staging/
          cp -r "Theta Review/css"        pkg-staging/
          cp -r "Theta Review/img"        pkg-staging/
          cp "Theta Review/native/mac/WorkflowIntegration.node" pkg-staging/
          # Bundle into archive alongside postinstall — extracted by postinstall at install time
          tar -czf installer/mac/scripts/plugin.tar.gz -C pkg-staging .

      - name: Build PKG
        run: |
          chmod +x installer/mac/scripts/postinstall

          # Scripts-only package — no payload, postinstall extracts plugin.tar.gz
          pkgbuild \
            --nopayload \
            --scripts       installer/mac/scripts \
            --identifier    com.theta-studios.review \
            --version       "${{ steps.version.outputs.version }}" \
            ThetaReview-component.pkg

          # Wrap with productbuild for welcome screen and standard macOS installer UI
          productbuild \
            --distribution  installer/mac/distribution.xml \
            --package-path  . \
            --resources     installer/mac/welcome \
            "ThetaReview-${{ github.ref_name }}-mac.pkg"

      - name: Upload PKG artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-pkg
          path: "ThetaReview-${{ github.ref_name }}-mac.pkg"

  build-win:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: version
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^v', ''
          echo "version=$v" >> $env:GITHUB_OUTPUT

      - name: Stamp version into manifest.xml
        shell: pwsh
        run: |
          $v = "${{ steps.version.outputs.version }}"
          (Get-Content "Theta Review/manifest.xml") `
            -replace '<Version>.*</Version>', "<Version>$v</Version>" |
            Set-Content "Theta Review/manifest.xml"

      - name: Stage plugin files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path installer/win/plugin | Out-Null
          Copy-Item "Theta Review/manifest.xml" installer/win/plugin/
          Copy-Item "Theta Review/main.js"      installer/win/plugin/
          Copy-Item "Theta Review/preload.js"   installer/win/plugin/
          Copy-Item "Theta Review/index.html"   installer/win/plugin/
          Copy-Item -Recurse "Theta Review/js"  installer/win/plugin/
          Copy-Item -Recurse "Theta Review/css" installer/win/plugin/
          Copy-Item -Recurse "Theta Review/img" installer/win/plugin/
          Copy-Item "Theta Review/native/win/WorkflowIntegration.node" installer/win/plugin/

      - name: Install NSIS
        run: choco install nsis --no-progress -y

      - name: Convert icon PNG to ICO
        shell: pwsh
        run: |
          magick "Theta Review/img/icon.png" -resize 256x256 installer/win/icon.ico

      - name: Build EXE
        shell: pwsh
        working-directory: installer/win
        run: |
          & "C:\Program Files (x86)\NSIS\makensis.exe" `
            /DVERSION=${{ steps.version.outputs.version }} `
            /DICONFILE=icon.ico `
            installer.nsi

      - name: Rename output
        shell: pwsh
        run: |
          Move-Item "installer/win/ThetaReview-${{ steps.version.outputs.version }}-windows.exe" `
                    "ThetaReview-${{ github.ref_name }}-windows.exe"

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-exe
          path: "ThetaReview-${{ github.ref_name }}-windows.exe"

  publish:
    name: Publish GitHub Release
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: mac-pkg
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: win-exe
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
