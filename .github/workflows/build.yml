name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    name: Build macOS DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stage plugin files
        run: |
          mkdir -p staging/plugin
          # Copy all plugin source files
          cp "Theta Review/manifest.xml"  staging/plugin/
          cp "Theta Review/main.js"       staging/plugin/
          cp "Theta Review/preload.js"    staging/plugin/
          cp "Theta Review/index.html"    staging/plugin/
          cp -r "Theta Review/js"         staging/plugin/
          cp -r "Theta Review/css"        staging/plugin/
          cp -r "Theta Review/img"        staging/plugin/
          # Place the Mac .node at the plugin root (where Resolve expects it)
          cp "Theta Review/native/mac/WorkflowIntegration.node" staging/plugin/
          # Copy install script
          cp "installer/mac/Install Theta Review.command" staging/
          chmod +x "staging/Install Theta Review.command"

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "Theta Review" \
            -srcfolder staging \
            -ov -format UDZO \
            "ThetaReview-${{ github.ref_name }}-mac.dmg"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: "ThetaReview-${{ github.ref_name }}-mac.dmg"

  build-win:
    name: Build Windows ZIP
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stage plugin files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging/plugin | Out-Null
          Copy-Item "Theta Review/manifest.xml" staging/plugin/
          Copy-Item "Theta Review/main.js"      staging/plugin/
          Copy-Item "Theta Review/preload.js"   staging/plugin/
          Copy-Item "Theta Review/index.html"   staging/plugin/
          Copy-Item -Recurse "Theta Review/js"  staging/plugin/
          Copy-Item -Recurse "Theta Review/css" staging/plugin/
          Copy-Item -Recurse "Theta Review/img" staging/plugin/
          # Place the Windows .node at the plugin root
          Copy-Item "Theta Review/native/win/WorkflowIntegration.node" staging/plugin/
          # Copy install script
          Copy-Item "installer/win/Install Theta Review.bat" staging/

      - name: Create ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path staging/* -DestinationPath "ThetaReview-${{ github.ref_name }}-windows.zip"

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-zip
          path: "ThetaReview-${{ github.ref_name }}-windows.zip"

  publish:
    name: Publish GitHub Release
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: mac-dmg
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: win-zip
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
